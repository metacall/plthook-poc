name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests
    strategy:
      fail-fast: false
      matrix:
        os: [
          macos-14, macos-15, macos-15-intel,
          ubuntu-22.04, ubuntu-24.04,
          windows-2019, windows-2022, windows-2025
        ]
        build: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Build & Test Project
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=${{ matrix.build }} ..
        cmake --build . --config ${{ matrix.build }}
        ctest -VV -C ${{ matrix.build }}

  test_msys2:
    name: Tests MSYS2
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { sys: mingw64, env: x86_64 }
          - { sys: mingw32, env: i686 }
          - { sys: ucrt64,  env: ucrt-x86_64 }
          - { sys: clang64, env: clang-x86_64 }

    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2.30.0
        with:
          msystem: ${{ matrix.sys }}
          update: true
          install: >
            mingw-w64-${{ matrix.env }}-gcc
          pacboy: >
            toolchain:p
            cmake:p
            ninja:p
      - name: Build & Test Project (Debug)
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}
        run: |
          mkdir build-debug
          cd build-debug
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Debug ..
          cmake --build . --config Debug
          ctest -VV -C Debug
      - name: Build & Test Project (Release)
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}
        run: |
          mkdir build-release
          cd build-release
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release
          ctest -VV -C Release
  tests_on_bsd:
    name: Tests on BSD
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: freebsd, version: '12.4' }
          - { name: freebsd, version: '15.0' }
          - { name: netbsd,  version: '10.1' }
          # - { name: openbsd, version: '7.6' }
        architecture:
          - x86-64
          - arm64
        build: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Test on BSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          architecture: ${{ matrix.architecture }}
          shell: sh
          run: |
            set -exuo pipefail
            OS=$(uname -s)

            if [ "$OS" = "FreeBSD" ]; then
              pkg install -y cmake
            elif [ "$OS" = "NetBSD" ]; then
              sudo pkgin -y install cmake gcc
            fi

            mkdir build
            cd build
            cmake -DCMAKE_BUILD_TYPE=${{ matrix.build }} ..
            cmake --build .
            ctest -VV
